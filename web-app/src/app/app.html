<div class="layout-shell" [class.sidebar-collapsed]="sidebarCollapsed">
  <aside class="sidebar">
    <div class="brand">
      <div class="logo-mark" aria-hidden="true">HSM</div>
      <div class="brand-copy">
        <div class="brand-title">Heat Sensor Monitor</div>
        <div class="brand-subtitle">Operations Console</div>
      </div>
    </div>

    <nav class="main-nav" aria-label="Hauptnavigation">
      <a routerLink="/temperaturen" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">🌡️</span>
        <span class="nav-label">Temperaturen</span>
      </a>
      <a routerLink="/sensor-admin" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">⚙️</span>
        <span class="nav-label">Sensor Administration</span>
      </a>
    </nav>

    <footer class="meta-footer">
      <p>Git Commit: {{ configService.buildInfo.gitCommit }}</p>
      <p>Build: {{ configService.buildInfo.buildTimestamp }}</p>
    </footer>
  </aside>

  <main class="content-area">
    <button class="sidebar-toggle" (click)="toggleSidebar()" 
            [attr.aria-label]="sidebarCollapsed ? 'Menü öffnen' : 'Menü schließen'"
            [attr.title]="sidebarCollapsed ? 'Menü öffnen' : 'Menü schließen'">
      <span class="toggle-icon">☰</span>
    </button>
    <router-outlet />
  </main>
</div>
