<section class="page-card">
  <header class="page-header">
    <h1>Sensor Administration</h1>
    <button type="button" (click)="reloadSensors()" [disabled]="loading || saving">Neu laden</button>
  </header>

  @if (errorMessage) {
    <p class="error-box">{{ errorMessage }}</p>
  }

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Sensor Address</th>
          <th>Name</th>
          <th>Gruppe</th>
          <th>Farbe</th>
          <th>Linientyp</th>
          <th>Aktiv</th>
          <th>Aktionen</th>
        </tr>
      </thead>
      <tbody>
        @for (sensor of sensors; track sensor._originalAddress) {
          <tr>
            <td><input [(ngModel)]="sensor.sensorAddress" /></td>
            <td><input [(ngModel)]="sensor.name" /></td>
            <td><input [(ngModel)]="sensor.groupName" /></td>
            <td>
              <div class="color-cell">
                <input type="color" [(ngModel)]="sensor.color" />
                <input [(ngModel)]="sensor.color" />
              </div>
            </td>
            <td>
              <select [(ngModel)]="sensor.lineType" (change)="onLineTypeChanged()" class="line-type-select">
                @for (lineType of lineTypes; track lineType.value) {
                  <option [value]="lineType.value">{{ lineType.label }}</option>
                }
              </select>
            </td>
            <td>
              <label class="switch-wrap">
                <input type="checkbox" [(ngModel)]="sensor.active" />
                Aktiv
              </label>
            </td>
            <td class="action-cell">
              <button 
                type="button" 
                class="delete-icon-btn"
                (click)="deleteSensor(sensor)"
                title="Sensor löschen"
                aria-label="Sensor löschen">
                ❌
              </button>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>

  <div class="save-all-section">
    <button type="button" class="primary" (click)="saveAllSensors()" [disabled]="loading || saving || sensors.length === 0">
      @if (saving) {
        Speichern...
      } @else {
        Alle Sensoren speichern
      }
    </button>
  </div>

  <div class="new-sensor-box">
    <h2>Neuen Sensor hinzufuegen</h2>
    <div class="new-sensor-grid">
      <label>
        Sensor Address
        <input [(ngModel)]="newSensor.sensorAddress" placeholder="28-xxxx" />
      </label>
      <label>
        Name
        <input [(ngModel)]="newSensor.name" />
      </label>
      <label>
        Gruppe
        <input [(ngModel)]="newSensor.groupName" />
      </label>
      <label>
        Farbe
        <input type="color" [(ngModel)]="newSensor.color" />
      </label>
      <label>
        Linientyp
        <select [(ngModel)]="newSensor.lineType" (change)="onLineTypeChanged()" class="line-type-select">
          @for (lineType of lineTypes; track lineType.value) {
            <option [value]="lineType.value">{{ lineType.label }}</option>
          }
        </select>
      </label>
      <label>
        Aktiv
        <input type="checkbox" [(ngModel)]="newSensor.active" />
      </label>
    </div>
    <button type="button" class="primary" (click)="addSensor()">Sensor anlegen</button>
  </div>
</section>
