<section class="page-card">
  <header class="page-header">
    <h1>Temperaturen</h1>
    <div class="date-picker-controls">
      <button (click)="previousDay()" class="date-btn" title="Einen Tag zurück">⬅ Zurück</button>
      <button (click)="goToToday()" class="date-btn date-btn-today" title="Gehe zu heute">📅 Heute</button>
      <button (click)="nextDay()" [disabled]="isMaxDateReached()" class="date-btn" title="Einen Tag vorwärts">Vorwärts ➡</button>
      <input 
        type="date" 
        [(ngModel)]="selectedDate" 
        (change)="onDateChanged()" 
        [max]="todayIsoDate()"
        class="date-input"
      />
    </div>
  </header>

  @if (errorMessage) {
    <p class="error-box">{{ errorMessage }}</p>
  }

  <div class="content-grid">
    <aside class="sensor-list-panel">
      <h2>Aktive Sensoren</h2>
      @if (activeSensors.length === 0) {
        <p>Keine aktiven Sensoren gefunden.</p>
      }

      <div class="sensor-list">
        @for (sensor of activeSensors; track sensor.sensorAddress) {
          <label class="sensor-item">
            <input
              type="checkbox"
              [(ngModel)]="selectedSensors[sensor.sensorAddress]"
              (change)="onSensorSelectionChanged()"
            />
            <span class="swatch" [style.backgroundColor]="sensor.color || '#f26a2e'"></span>
            <span>{{ sensor.name || sensor.sensorAddress }}</span>
          </label>
        }
      </div>
    </aside>

    <div class="chart-panel">
      @if (loading) {
        <p>Lade Daten...</p>
      }
      <div class="chart-wrap">
        <canvas baseChart [data]="lineChartData" [options]="lineChartOptions" [type]="lineChartType"> </canvas>
      </div>
    </div>
  </div>
</section>
